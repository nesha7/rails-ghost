name: RSpec Tests

on:
  push:
    branches:
      - '**'

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3.0'
          bundler-cache: true

  test:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ci_node_index: [0, 1, 2]
        ci_node_total: [3]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rubyci_homepage_test
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      RAILS_ENV: test
      DB_ADAPTER: postgresql
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_HOST: postgres

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        id: setup-ruby
        continue-on-error: true
        with:
          ruby-version: '3.3.0'
          bundler-cache: true

      - name: Retry Set up Ruby
        if: steps.setup-ruby.outcome == 'failure'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3.0'
          bundler-cache: true

      - name: Set up database
        run: bin/rails db:create db:schema:load

      - name: Split and run RSpec
        run: |
          TIMING_FILE=/mnt/data/gitea/rspec_timings/${{ github.repository_owner }}/${{ github.event.repository.name }}/timings.txt
          if [ -f "$TIMING_FILE" ]; then
            echo "Timing file found with $(wc -l < $TIMING_FILE) entries"
          else
            echo "No timing file found, using fallback"
          fi
          FILES=$(.gitea/scripts/split_tests.sh ${{ matrix.ci_node_index }} ${{ matrix.ci_node_total }} $TIMING_FILE)
          echo "Running: $FILES"
          bundle exec rspec $FILES --format progress --format json --out tmp/rspec_results.json

      - name: Save node timing data
        if: always()
        run: |
          TIMING_DIR=/mnt/data/gitea/rspec_timings/${{ github.repository_owner }}/${{ github.event.repository.name }}
          mkdir -p $TIMING_DIR
          if [ -f tmp/rspec_results.json ]; then
            jq -r '.examples[] | "\(.run_time) \(.file_path | ltrimstr("./"))"' tmp/rspec_results.json | \
              awk '{files[$2]+=$1} END {for(f in files) printf "%.4f %s\n", files[f], f}' \
              > $TIMING_DIR/node_${{ matrix.ci_node_index }}.txt
            echo "Timing data from this node: $(wc -l < $TIMING_DIR/node_${{ matrix.ci_node_index }}.txt) entries"
          fi

  merge-timings:
    needs: test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Merge timing data from all nodes
        run: |
          TIMING_DIR=/mnt/data/gitea/rspec_timings/${{ github.repository_owner }}/${{ github.event.repository.name }}
          cat $TIMING_DIR/node_*.txt | \
            awk '{files[$2]=$1} END {for(f in files) print files[f], f}' | \
            sort -k2 > $TIMING_DIR/timings.txt
          echo "Total timing entries: $(wc -l < $TIMING_DIR/timings.txt)"
